<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="uƒtf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送迎バス位置</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    .bus-icon {
  background: transparent;
  border: none;
}

.bus-icon div {
  font-size: 95px;
  width: 120px;
  height: 120px;
  line-height: 120px;
  text-align: center;
  text-shadow:
    -3px -3px 0 #fff,
     3px -3px 0 #fff,
    -3px  3px 0 #fff,
     3px  3px 0 #fff,
     0px  0px 6px rgba(0,0,0,0.35);
}    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 18px;
      font-weight: bold;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      line-height: 1.5;
    }

    #map {
      width: 100%;
      height: calc(100% - 96px);
    }
  </style>
</head>
<body>
  <div class="header">送迎バス位置</div>
  <div class="info" id="status">読み込み中...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxzzWoKWCjjK6GFpaJvgmIOOEmBBQOGcOBvcjhDlL0LHKVjBBcyt6KDFIrHKquetnJ7/exec?action=getLocations";

  const map = L.map("map").setView([35.5457, 139.5331], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  const markers = {};

  function createBusIcon() {
    return L.divIcon({
      className: "bus-icon",
      html: "<div>🚌</div>",
      iconSize: [120, 120],
      iconAnchor: [60, 60]
    });
  }

  async function loadBus() {
    try {
      const res = await fetch(GAS_URL);
      const buses = await res.json();

      if (!Array.isArray(buses) || buses.length === 0) {
        document.getElementById("status").textContent = "バスデータがありません";
        return;
      }

      let visibleCount = 0;

      buses.forEach((bus) => {
        const lat = Number(bus.lat);
        const lng = Number(bus.lng);

        if (Number.isNaN(lat) || Number.isNaN(lng) || lat === 0 || lng === 0) {
          return;
        }

        const id = bus.bus_id || "";
        const routeName = bus.route_name || "";
        const busStatus = bus.status || "";
        const updatedAt = bus.updated_at || "";
        const note = bus.note || "";

        visibleCount++;

        const popupHtml =
          `<b>${routeName}</b><br>` +
          `バス: ${id}<br>` +
          `状態: ${busStatus}<br>` +
          `更新: ${updatedAt}` +
          (note ? `<br>備考: ${note}` : "");

        if (!markers[id]) {
          markers[id] = L.marker([lat, lng], { icon: createBusIcon() }).addTo(map);
        } else {
          markers[id].setLatLng([lat, lng]);
          markers[id].setIcon(createBusIcon());
        }

        markers[id].bindPopup(popupHtml);
      });

      document.getElementById("status").textContent =
        `表示中：${visibleCount}台 / 最終更新: ${new Date().toLocaleTimeString("ja-JP")}`;
    } catch (error) {
      console.error(error);
      document.getElementById("status").textContent = "読み込みに失敗しました";
    }
  }

  loadBus();
  setInterval(loadBus, 10000);
  </script>
</body>
</html>
