<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送迎バス位置</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 18px;
      font-weight: bold;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    #map {
      width: 100%;
      height: calc(100% - 96px);
    }
  </style>
</head>
<body>
  <div class="header">送迎バス位置</div>
  <div class="info" id="status">読み込み中...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([35.5540, 139.5360], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const busData = {
      busId: 'BUS01',
      routeName: '鴨志田',
      status: '運行中',
      lat: 35.5540,
      lng: 139.5360,
      updatedAt: new Date().toLocaleString('ja-JP')
    };

    const marker = L.marker([busData.lat, busData.lng]).addTo(map);

    marker.bindPopup(
      `<b>${busData.busId}</b><br>` +
      `路線: ${busData.routeName}<br>` +
      `状態: ${busData.status}<br>` +
      `更新: ${busData.updatedAt}`
    );

    document.getElementById('status').textContent =
      `${busData.busId} / ${busData.routeName} / ${busData.status} / 更新: ${busData.updatedAt}`;
  </script>
</body>
</html>
