<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送迎バス位置</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 18px;
      font-weight: bold;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    .route-bar {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
    }

    .route-bar select {
      padding: 8px;
      border-radius: 8px;
    }

    #map {
      height: calc(100vh - 120px);
    }

    .bus-icon div {
      font-size: 60px;
      width: 75px;
      height: 75px;
      line-height: 75px;
      text-align: center;
      text-shadow:
        -3px -3px 0 #fff,
         3px -3px 0 #fff,
        -3px  3px 0 #fff,
         3px  3px 0 #fff,
         0px  0px 6px rgba(0,0,0,0.35);
    }
  </style>
</head>

<body>
  <div class="header">送迎バス位置</div>
  <div class="info" id="status">読み込み中...</div>

  <div class="route-bar">
    <select id="routeSelector">
      <option value="鴨志田">鴨志田</option>
      <option value="たまプラ">たまプラ</option>
      <option value="ニュータウン">ニュータウン</option>
      <option value="十日市場">十日市場</option>
      <option value="成瀬">成瀬</option>
    </select>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const GAS_BASE_URL = "https://script.google.com/macros/s/AKfycbxzzWoKWCjjK6GFpaJvgmIOOEmBBQOGcOBvcjhDlL0LHKVjBBcyt6KDFIrHKquetnJ7/exec";

    const map = L.map("map").setView([35.5457, 139.5331], 13);

    // ★ 見やすい地図に変更済み
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    const markers = {};
    let routeLine = null;

    function createBusIcon() {
      return L.divIcon({
        className: "bus-icon",
        html: "<div>🚌</div>",
        iconSize: [75, 75],
        iconAnchor: [37, 37]
      });
    }

    function getRouteColor(routeName) {
      if (routeName === "鴨志田") return "#e53935";
      if (routeName === "たまプラ") return "#1e88e5";
      if (routeName === "ニュータウン") return "#43a047";
      if (routeName === "十日市場") return "#fb8c00";
      if (routeName === "成瀬") return "#8e24aa";
      return "#1565c0";
    }

    async function loadRoute(routeName) {
      try {
        const res = await fetch(`${GAS_BASE_URL}?action=getRoutePath&routeName=${encodeURIComponent(routeName)}`);
        const path = await res.json();

        if (routeLine) {
          map.removeLayer(routeLine);
        }

        if (Array.isArray(path) && path.length > 0) {
          routeLine = L.polyline(path, {
            color: getRouteColor(routeName),
            weight: 6
          }).addTo(map);

          map.fitBounds(routeLine.getBounds(), { padding: [20, 20] });
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function loadBus() {
      const selectedRoute = document.getElementById("routeSelector").value;

      const res = await fetch(`${GAS_BASE_URL}?action=getLocations`);
      const buses = await res.json();

      let count = 0;
      const activeIds = new Set();

      buses.forEach(bus => {
        if ((bus.route_name || "") !== selectedRoute) return;

        const status = (bus.status || "").trim();
        const note = (bus.note || "").trim();

        if (status.includes("回送") || status.includes("非公開") || note.includes("非公開")) return;

        // ★ 5分更新なしは非表示
        const updatedAt = bus.updated_at ? new Date(bus.updated_at.replace(" ", "T")) : null;
        if (!updatedAt || isNaN(updatedAt.getTime())) return;

        const diffMin = (new Date() - updatedAt) / 1000 / 60;
        if (diffMin > 5) return;

        const lat = Number(bus.lat);
        const lng = Number(bus.lng);
        if (!lat || !lng) return;

        const id = bus.bus_id || "";
        activeIds.add(id);
        count++;

        if (!markers[id]) {
          markers[id] = L.marker([lat, lng], { icon: createBusIcon() }).addTo(map);
        } else {
          markers[id].setLatLng([lat, lng]);
        }

        markers[id].bindPopup(
          `<b>${bus.route_name}</b><br>バス:${id}<br>状態:${bus.status}`
        );
      });

      Object.keys(markers).forEach(id => {
        if (!activeIds.has(id)) {
          map.removeLayer(markers[id]);
          delete markers[id];
        }
      });

      document.getElementById("status").textContent =
        `${selectedRoute} / ${count}台 / ${new Date().toLocaleTimeString()}`;
    }

    async function changeRoute() {
      const route = document.getElementById("routeSelector").value;
      await loadRoute(route);
      await loadBus();
    }

    document.getElementById("routeSelector").addEventListener("change", changeRoute);

    changeRoute();
    setInterval(loadBus, 15000);
  </script>
</body>
</html>
