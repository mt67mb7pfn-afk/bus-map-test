<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送迎バス現在地</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #d8dee6;
      --header: #1f3b57;
      --accent: #1565c0;
      --shadow: 0 4px 14px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
    }

    .header {
      background: var(--header);
      color: #fff;
      padding: 12px 16px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .header-sub {
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.9;
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px;
    }

    .main-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .section {
      background: var(--card);
      border: 1px solid #eef1f4;
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .selector {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
    }

    .map-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid #e6e9ee;
      margin-bottom: 12px;
      background: #e5e7eb;
    }

    .map-area {
      height: 72vh;
      min-height: 460px;
      background: #e5e7eb;
    }

    .map-floating-location-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2000;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      background: rgba(21, 101, 192, 0.96);
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
      cursor: pointer;
    }

    .version {
      margin-bottom: 0;
      font-size: 12px;
      color: #b91c1c;
      font-weight: 700;
    }

    .error {
      color: #c62828;
      font-weight: bold;
    }

    .bus-icon {
      background: transparent;
      border: none;
    }

    .bus-icon div {
      font-size: 52px;
      width: 70px;
      height: 70px;
      line-height: 70px;
      text-align: center;
      text-shadow:
        -3px -3px 0 #fff,
         3px -3px 0 #fff,
        -3px  3px 0 #fff,
         3px  3px 0 #fff,
         0px  0px 6px rgba(0,0,0,0.35);
    }

    .stop-label {
      background: transparent;
      border: none;
    }

    .stop-label div {
      display: inline-block;
      background: rgba(255,255,255,0.95);
      border: 1px solid #d7dde5;
      border-radius: 8px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      color: #263238;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    @media (max-width: 480px) {
      .header {
        padding: 10px 12px 9px;
      }

      .header-title {
        font-size: 16px;
      }

      .page {
        padding: 6px;
      }

      .main-card {
        padding: 8px;
        border-radius: 12px;
      }

      .section {
        padding: 8px;
        margin-bottom: 8px;
        border-radius: 10px;
      }

      .section-title {
        font-size: 12px;
        margin-bottom: 6px;
      }

      .selector {
        padding: 10px 12px;
        font-size: 15px;
        border-radius: 8px;
      }

      .map-floating-location-btn {
        top: 10px;
        right: 10px;
        padding: 9px 12px;
        font-size: 13px;
      }

      .map-area {
        height: 74vh;
        min-height: 400px;
      }

      .version {
        font-size: 11px;
      }

      .bus-icon div {
        font-size: 48px;
        width: 64px;
        height: 64px;
        line-height: 64px;
      }

      .stop-label div {
        font-size: 10px;
        padding: 2px 6px;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-title">送迎バス現在地</div>
    <div class="header-sub">地図上で送迎バスの現在位置をご確認いただけます</div>
  </div>

  <div class="page">
    <div class="main-card">

      <div class="section">
        <div class="section-title">送迎ルート</div>
        <select id="routeSelector" class="selector">
          <option value="鴨志田">鴨志田</option>
          <option value="たまプラ">たまプラ</option>
          <option value="ニュータウン">ニュータウン</option>
          <option value="十日市場">十日市場</option>
          <option value="成瀬">成瀬</option>
        </select>
      </div>

      <div class="map-wrap">
        <button type="button" class="map-floating-location-btn" onclick="showUserLocation(true)">
          現在地
        </button>
        <div id="map" class="map-area"></div>
      </div>

      <div class="version">軽量版 / GitHub公開用</div>

    </div>
  </div>

  <script>
    const API_BASE = 'https://script.google.com/macros/s/AKfycbx3IdwRgyzBTt-_efBSiBNyMwExDcBTwQAHRuX13VS09fj86jiKBjtw2ITVQLcEheU/exec';

    let map;
    let mapInitialized = false;

    let baseLayers = [];
    let busLayers = [];
    let stopLabelLayers = [];
    let stopCache = [];
    let currentVisibleBuses = [];
    let currentRouteName = '';
    let userLocationLayer = null;
    let userAccuracyLayer = null;
    let hasAutoCenteredUser = false;

    function calcDistanceKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function shouldHideBus(bus) {
      const note = (bus.note || '').trim();
      const status = (bus.status || '').trim();

      if (note.indexOf('非公開') !== -1) return true;
      if (status.indexOf('非公開') !== -1) return true;
      if (status.indexOf('回送') !== -1) return true;
      if (!bus.updated_at) return true;

      const lastUpdate = new Date(bus.updated_at);
      const now = new Date();
      const diffMinutes = (now - lastUpdate) / 1000 / 60;

      return diffMinutes > 5;
    }

    function getRouteColor(routeName) {
      if (routeName === '鴨志田') return { main: '#e53935', dark: '#b71c1c' };
      if (routeName === 'たまプラ') return { main: '#1e88e5', dark: '#0d47a1' };
      if (routeName === 'ニュータウン') return { main: '#43a047', dark: '#1b5e20' };
      if (routeName === '十日市場') return { main: '#fb8c00', dark: '#e65100' };
      if (routeName === '成瀬') return { main: '#8e24aa', dark: '#4a148c' };
      return { main: '#1e88e5', dark: '#0d47a1' };
    }

    async function fetchJson(apiName, routeName = '') {
      const url = routeName
        ? `${API_BASE}?api=${encodeURIComponent(apiName)}&routeName=${encodeURIComponent(routeName)}`
        : `${API_BASE}?api=${encodeURIComponent(apiName)}`;

      const res = await fetch(url);
      if (!res.ok) throw new Error('通信エラー');
      return await res.json();
    }

    function initMap() {
      if (mapInitialized) return;

      map = L.map('map').setView([35.5535, 139.5795], 13);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
      }).addTo(map);

      mapInitialized = true;
    }

    function clearBaseLayers() {
      baseLayers.forEach(layer => map.removeLayer(layer));
      baseLayers = [];

      stopLabelLayers.forEach(layer => {
        if (map.hasLayer(layer)) map.removeLayer(layer);
      });
      stopLabelLayers = [];
    }

    function clearBusLayers() {
      busLayers.forEach(layer => map.removeLayer(layer));
      busLayers = [];
    }

    function addBaseLayer(layer) {
      layer.addTo(map);
      baseLayers.push(layer);
    }

    function addBusLayer(layer) {
      layer.addTo(map);
      busLayers.push(layer);
    }

    function addStopLabelLayer(layer) {
      layer.addTo(map);
      stopLabelLayers.push(layer);
    }

    function updateStopLabelVisibility() {
      const zoom = map.getZoom();

      stopLabelLayers.forEach(layer => {
        if (zoom >= 15) {
          if (!map.hasLayer(layer)) map.addLayer(layer);
        } else {
          if (map.hasLayer(layer)) map.removeLayer(layer);
        }
      });
    }

    function renderBusMarkers() {
      clearBusLayers();

      currentVisibleBuses.forEach(bus => {
        if (bus.lat !== '' && bus.lng !== '') {
          const busIcon = L.divIcon({
            html: '<div>🚌</div>',
            className: 'bus-icon',
            iconSize: [70, 70],
            iconAnchor: [35, 35]
          });

          const marker = L.marker([bus.lat, bus.lng], { icon: busIcon }).bindPopup(
            '<b>' + (bus.route_name || '') + '</b><br>' +
            '状態: ' + (bus.status || '')
          );

          addBusLayer(marker);
        }
      });
    }

    function clearUserLocation() {
      if (userLocationLayer) {
        map.removeLayer(userLocationLayer);
        userLocationLayer = null;
      }

      if (userAccuracyLayer) {
        map.removeLayer(userAccuracyLayer);
        userAccuracyLayer = null;
      }
    }

    function showUserLocation(forceCenter) {
      if (!navigator.geolocation) {
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy || 0;

          clearUserLocation();

          userAccuracyLayer = L.circle([lat, lng], {
            radius: accuracy,
            color: '#1976d2',
            fillColor: '#64b5f6',
            fillOpacity: 0.15,
            weight: 1
          }).addTo(map);

          userLocationLayer = L.circleMarker([lat, lng], {
            radius: 8,
            color: '#1565c0',
            fillColor: '#1e88e5',
            fillOpacity: 1,
            weight: 2
          }).bindPopup('あなたの現在地').addTo(map);

          if (forceCenter || !hasAutoCenteredUser) {
            map.setView([lat, lng], 15);
            hasAutoCenteredUser = true;
          }
        },
        function(error) {
          console.error(error);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 30000
        }
      );
    }

    async function loadRouteLayers(routeName) {
      clearBaseLayers();
      stopCache = [];

      try {
        const [pathData, restrictedPath, stops] = await Promise.all([
          fetchJson('routePath', routeName),
          fetchJson('restrictedPath', routeName),
          fetchJson('stops', routeName)
        ]);

        if (pathData && pathData.length > 0) {
          const routeColors = getRouteColor(routeName);

          const routeLine = L.polyline(pathData, {
            color: routeColors.main,
            weight: 6,
            opacity: 1
          });

          addBaseLayer(routeLine);
          map.fitBounds(pathData);
        }

        if (restrictedPath && restrictedPath.length > 0) {
          const restrictedLine = L.polyline(restrictedPath, {
            color: '#444',
            weight: 5,
            opacity: 1,
            dashArray: '10,10'
          });

          addBaseLayer(restrictedLine);
        }

        stopCache = stops || [];

        if (stopCache.length > 0) {
          stopCache.forEach(stop => {
            if (!isNaN(stop.lat) && !isNaN(stop.lng)) {
              const routeColors = getRouteColor(currentRouteName);

              const stopMarker = L.circleMarker([stop.lat, stop.lng], {
                radius: 10,
                color: routeColors.dark,
                fillColor: routeColors.main,
                fillOpacity: 0.85,
                weight: 3
              }).bindPopup(
                '<b>' + (stop.stop_name || '') + '</b><br>' +
                '順番: ' + (stop.stop_order || '') + '<br>' +
                '備考: ' + (stop.note || '')
              );

              addBaseLayer(stopMarker);

              const stopLabel = L.marker([stop.lat, stop.lng], {
                icon: L.divIcon({
                  className: 'stop-label',
                  html: '<div>' + (stop.stop_name || '') + '</div>',
                  iconSize: [120, 20],
                  iconAnchor: [-8, 10]
                })
              });

              addStopLabelLayer(stopLabel);
            }
          });
        }

        updateStopLabelVisibility();
      } catch (e) {
        console.error(e);
      }
    }

    async function loadBusData() {
      initMap();

      currentRouteName = document.getElementById('routeSelector').value;
      currentVisibleBuses = [];

      try {
        const data = await fetchJson('busLocations');

        if (data && data.length > 0) {
          data.forEach(bus => {
            if (shouldHideBus(bus)) return;
            if (String(bus.route_name) !== String(currentRouteName)) return;
            currentVisibleBuses.push(bus);
          });
        }

        renderBusMarkers();
      } catch (e) {
        console.error(e);
      }
    }

    function changeRoute() {
      currentRouteName = document.getElementById('routeSelector').value;
      currentVisibleBuses = [];
      stopCache = [];
      clearBusLayers();

      loadBusData();
      loadRouteLayers(currentRouteName);
    }

    window.addEventListener('load', function() {
      initMap();
      currentRouteName = document.getElementById('routeSelector').value;

      loadBusData();
      loadRouteLayers(currentRouteName);

      document.getElementById('routeSelector').addEventListener('change', function() {
        changeRoute();
      });

      map.on('zoomend', function() {
        updateStopLabelVisibility();
      });

      setTimeout(function() {
        showUserLocation(false);
      }, 2500);

      setInterval(function() {
        loadBusData();
      }, 20000);
    });
  </script>
</body>
</html>
