<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送迎バス位置</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 18px;
      font-weight: bold;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      line-height: 1.5;
    }

    #map {
      width: 100%;
      height: calc(100% - 96px);
    }
  </style>
</head>
<body>
  <div class="header">送迎バス位置</div>
  <div class="info" id="status">読み込み中...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const GAS_URL = "YOUR_GAS_URL?action=getLocations";

    const map = L.map("map").setView([35.5457, 139.5331], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const markers = {};

    async function loadBus() {
      try {
        const res = await fetch(GAS_URL);
        const buses = await res.json();

        if (!Array.isArray(buses) || buses.length === 0) {
          document.getElementById("status").textContent = "バスデータがありません";
          return;
        }

        let statusText = `運行台数：${buses.length}台`;

        buses.forEach((bus) => {
          const lat = Number(bus.lat);
          const lng = Number(bus.lng);

          if (Number.isNaN(lat) || Number.isNaN(lng) || lat === 0 || lng === 0) {
            return;
          }

          const id = bus.bus_id || "";
          const routeName = bus.route_name || "";
          const busStatus = bus.status || "";
          const updatedAt = bus.updated_at || "";

          const popupHtml =
            `<b>${id}</b><br>` +
            `路線: ${routeName}<br>` +
            `状態: ${busStatus}<br>` +
            `更新: ${updatedAt}`;

          if (!markers[id]) {
            markers[id] = L.marker([lat, lng]).addTo(map);
          } else {
            markers[id].setLatLng([lat, lng]);
          }

          markers[id].bindPopup(popupHtml);
        });

        document.getElementById("status").textContent = statusText;
      } catch (error) {
        console.error(error);
        document.getElementById("status").textContent = "読み込みに失敗しました";
      }
    }

    loadBus();
    setInterval(loadBus, 10000);
  </script>
</body>
</html>
