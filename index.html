<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送迎バス位置</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 18px;
      font-weight: bold;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    #map {
      width: 100%;
      height: calc(100% - 96px);
    }
  </style>
</head>
<body>
  <div class="header">送迎バス位置</div>
  <div class="info" id="status">読み込み中...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>

const map = L.map('map').setView([35.5457,139.5331],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map)

let markers = {}

async function loadBus(){

 const res = await fetch("あなたのGAS_DEV_URL?action=getLocations") const buses = await res.json()

 buses.forEach(bus=>{

   const lat = Number(bus.lat)
   const lng = Number(bus.lng)

   if(!lat || !lng) return

   const id = bus.bus_id

   if(!markers[id]){

      markers[id] = L.marker([lat,lng])
        .addTo(map)
        .bindPopup(id)

   }else{

      markers[id].setLatLng([lat,lng])

   }

 })

}

loadBus()

setInterval(loadBus,10000)

</script></body>
</html>
