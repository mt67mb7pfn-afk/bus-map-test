<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送迎バス位置</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 18px;
      font-weight: bold;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      line-height: 1.5;
    }

    .route-bar {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    .route-bar label {
      margin-right: 8px;
      font-weight: bold;
    }

    .route-bar select {
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }

    .current-location-box {
      padding: 10px 16px;
      background: #eef6ff;
      border-bottom: 1px solid #d7e6f7;
    }

    .current-location-btn {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #1565c0;
      color: #fff;
    }

    .current-location-status {
      margin-top: 6px;
      font-size: 12px;
      color: #35516c;
      line-height: 1.5;
    }

    .bus-icon {
      background: transparent;
      border: none;
    }

    .bus-icon div {
      font-size: 70px;
      width: 90px;
      height: 90px;
      line-height: 90px;
      text-align: center;
      text-shadow:
        -3px -3px 0 #fff,
         3px -3px 0 #fff,
        -3px  3px 0 #fff,
         3px  3px 0 #fff,
         0px  0px 6px rgba(0,0,0,0.35);
    }

    .stop-label {
      background: transparent;
      border: none;
    }

    .stop-label div {
      display: inline-block;
      background: rgba(255,255,255,0.95);
      border: 1px solid #d7dde5;
      border-radius: 8px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      color: #263238;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    #map {
      width: 100%;
      height: calc(100vh - 220px);
      min-height: 420px;
    }

    @media (max-width: 480px) {
      .header {
        padding: 10px 12px;
        font-size: 16px;
      }

      .info,
      .route-bar,
      .current-location-box {
        padding-left: 12px;
        padding-right: 12px;
      }

      .bus-icon div {
        font-size: 64px;
        width: 82px;
        height: 82px;
        line-height: 82px;
      }

      #map {
        height: calc(100vh - 210px);
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="header">送迎バス位置</div>
  <div class="info" id="status">読み込み中...</div>

  <div class="route-bar">
    <label for="routeSelector">送迎ルート：</label>
    <select id="routeSelector">
      <option value="鴨志田">鴨志田</option>
      <option value="たまプラ">たまプラ</option>
      <option value="ニュータウン">ニュータウン</option>
      <option value="十日市場">十日市場</option>
      <option value="成瀬">成瀬</option>
    </select>
  </div>

  <div class="current-location-box">
    <button type="button" class="current-location-btn" onclick="showUserLocation(true)">
      現在地を表示し直す
    </button>
    <div id="currentLocationStatus" class="current-location-status">
      現在地を確認中...
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const GAS_BASE_URL = "https://script.google.com/macros/s/AKfycbxzzWoKWCjjK6GFpaJvgmIOOEmBBQOGcOBvcjhDlL0LHKVjBBcyt6KDFIrHKquetnJ7/exec";

    const map = L.map("map").setView([35.5457, 139.5331], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const markers = {};
    let routeLine = null;
    let stopLayers = [];
    let userLocationLayer = null;
    let userAccuracyLayer = null;
    let hasAutoCenteredUser = false;

    function createBusIcon() {
      return L.divIcon({
        className: "bus-icon",
        html: "<div>🚌</div>",
        iconSize: [90, 90],
        iconAnchor: [45, 45]
      });
    }

    function getRouteColor(routeName) {
      if (routeName === "鴨志田") return "#e53935";
      if (routeName === "たまプラ") return "#1e88e5";
      if (routeName === "ニュータウン") return "#43a047";
      if (routeName === "十日市場") return "#fb8c00";
      if (routeName === "成瀬") return "#8e24aa";
      return "#1565c0";
    }

    function clearStops() {
      stopLayers.forEach(layer => map.removeLayer(layer));
      stopLayers = [];
    }

    function clearUserLocation() {
      if (userLocationLayer) {
        map.removeLayer(userLocationLayer);
        userLocationLayer = null;
      }

      if (userAccuracyLayer) {
        map.removeLayer(userAccuracyLayer);
        userAccuracyLayer = null;
      }
    }

    function showUserLocation(forceCenter) {
      const status = document.getElementById("currentLocationStatus");

      if (!navigator.geolocation) {
        status.textContent = "この端末は現在地表示に対応していません";
        return;
      }

      status.textContent = "現在地を取得中...";

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy || 0;

          clearUserLocation();

          userAccuracyLayer = L.circle([lat, lng], {
            radius: accuracy,
            color: "#1976d2",
            fillColor: "#64b5f6",
            fillOpacity: 0.15,
            weight: 1
          }).addTo(map);

          userLocationLayer = L.circleMarker([lat, lng], {
            radius: 8,
            color: "#1565c0",
            fillColor: "#1e88e5",
            fillOpacity: 1,
            weight: 2
          }).bindPopup("あなたの現在地").addTo(map);

          if (forceCenter || !hasAutoCenteredUser) {
            map.setView([lat, lng], 15);
            hasAutoCenteredUser = true;
          }

          let text = "現在地を表示しました";
          if (accuracy) {
            text += "（誤差 約" + Math.round(accuracy) + "m）";
          }
          status.textContent = text;
        },
        function(error) {
          status.textContent = "現在地を取得できませんでした: " + error.message;
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 30000
        }
      );
    }

    async function loadRoute(routeName) {
      try {
        const res = await fetch(
          `${GAS_BASE_URL}?action=getRoutePath&routeName=${encodeURIComponent(routeName)}`
        );
        const path = await res.json();

        if (routeLine) {
          map.removeLayer(routeLine);
          routeLine = null;
        }

        if (Array.isArray(path) && path.length > 0) {
          routeLine = L.polyline(path, {
            color: getRouteColor(routeName),
            weight: 6,
            opacity: 0.9
          }).addTo(map);

          map.fitBounds(routeLine.getBounds(), { padding: [20, 20] });
        }
      } catch (error) {
        console.error("route load error", error);
      }
    }

    async function loadStops(routeName) {
      try {
        clearStops();

        const res = await fetch(
          `${GAS_BASE_URL}?action=getStops&routeName=${encodeURIComponent(routeName)}`
        );
        const stops = await res.json();

        if (!Array.isArray(stops) || stops.length === 0) return;

        const routeColor = getRouteColor(routeName);

        stops.forEach((stop) => {
          const lat = Number(stop.lat);
          const lng = Number(stop.lng);

          if (Number.isNaN(lat) || Number.isNaN(lng)) return;

          const stopMarker = L.circleMarker([lat, lng], {
            radius: 8,
            color: routeColor,
            fillColor: routeColor,
            fillOpacity: 0.85,
            weight: 2
          }).bindPopup(
            `<b>${stop.stop_name || ""}</b><br>` +
            `順番: ${stop.stop_order || ""}` +
            (stop.note ? `<br>備考: ${stop.note}` : "")
          );

          stopMarker.addTo(map);
          stopLayers.push(stopMarker);

          const stopLabel = L.marker([lat, lng], {
            icon: L.divIcon({
              className: "stop-label",
              html: `<div>${stop.stop_name || ""}</div>`,
              iconSize: [120, 20],
              iconAnchor: [-8, 10]
            })
          });

          stopLabel.addTo(map);
          stopLayers.push(stopLabel);
        });
      } catch (error) {
        console.error("stops load error", error);
      }
    }

    async function loadBus() {
      try {
        const selectedRoute = document.getElementById("routeSelector").value;
        const res = await fetch(`${GAS_BASE_URL}?action=getLocations`);
        const buses = await res.json();

        if (!Array.isArray(buses) || buses.length === 0) {
          document.getElementById("status").textContent = "バスデータがありません";
          return;
        }

        const activeIds = new Set();
        let visibleCount = 0;

        buses.forEach((bus) => {
          if ((bus.route_name || "") !== selectedRoute) return;

          const status = (bus.status || "").trim();
          const note = (bus.note || "").trim();

          if (status.includes("回送") || status.includes("非公開") || note.includes("非公開")) {
            return;
          }

          const lat = Number(bus.lat);
          const lng = Number(bus.lng);

          if (Number.isNaN(lat) || Number.isNaN(lng) || lat === 0 || lng === 0) return;

          const id = bus.bus_id || "";
          activeIds.add(id);
          visibleCount++;

          const popupHtml =
            `<b>${bus.route_name || ""}</b><br>` +
            `バス: ${id}<br>` +
            `状態: ${bus.status || ""}<br>` +
            `更新: ${bus.updated_at || ""}` +
            (bus.note ? `<br>備考: ${bus.note}` : "");

          if (!markers[id]) {
            markers[id] = L.marker([lat, lng], { icon: createBusIcon() }).addTo(map);
          } else {
            markers[id].setLatLng([lat, lng]);
            markers[id].setIcon(createBusIcon());
          }

          markers[id].bindPopup(popupHtml);
        });

        Object.keys(markers).forEach((id) => {
          if (!activeIds.has(id)) {
            map.removeLayer(markers[id]);
            delete markers[id];
          }
        });

        document.getElementById("status").textContent =
          `${selectedRoute} / 表示中：${visibleCount}台 / 最終更新: ${new Date().toLocaleTimeString("ja-JP")}`;
      } catch (error) {
        console.error(error);
        document.getElementById("status").textContent = "読み込みに失敗しました";
      }
    }

    async function changeRoute() {
      const routeName = document.getElementById("routeSelector").value;
      await loadRoute(routeName);
      await loadStops(routeName);
      await loadBus();
    }

    document.getElementById("routeSelector").addEventListener("change", changeRoute);

    changeRoute();

    setTimeout(() => {
      showUserLocation(false);
    }, 1000);

    setInterval(loadBus, 15000);
  </script>
</body>
</html>
